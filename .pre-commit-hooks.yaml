# pre-commit hooks for nodesafe.
# Add to your repo's .pre-commit-config.yaml:
#
#   repos:
#     - repo: https://github.com/neuregex/nodesafe
#       rev: v0.1.0
#       hooks:
#         - id: nodesafe

- id: nodesafe
  name: nodesafe scan
  description: Scan custom_nodes for malicious code
  entry: nodesafe scan
  language: python
  files: 'custom_nodes/.*\.(py|toml|txt)$'
  pass_filenames: false
  args: ["--fail-on", "suspicious", "--format", "markdown"]
